services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    ports:
      - "5432:5432"
    volumes:
      - opspilot-postgres:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PORT: 8787
      DATABASE_URL: postgres://opspilot:opspilot@postgres:5432/opspilot
      OPSPILOT_JWT_SECRET: change-me-in-production
      OPSPILOT_DATA_FILE: /app/.data/workspaces.json
    ports:
      - "8787:8787"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  opspilot-postgres:
